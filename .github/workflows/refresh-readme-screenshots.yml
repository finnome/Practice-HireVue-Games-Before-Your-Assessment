name: Refresh README screenshots

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download corrected 1920x1080 screenshots
        run: |
          mkdir -p images /tmp/readme-screenshots-v2
          curl -fL 'https://sdmntprjapaneast.oaiusercontent.com/files/00000000-f198-8209-9d54-2546824937e0/raw?se=2026-07-19T16:52:57Z&sp=r&sv=2026-02-06&sr=b&scid=fad80766-1942-5650-b4f3-dba93bf81437&skoid=03727f49-62d3-42ac-8350-1c0e6559d238&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-18T23:44:42Z&ske=2026-07-20T23:44:42Z&sks=b&skv=2026-02-06&sig=RAaDmwOHiRScs3Ib7uUPb1kRKCqW8JBoxFUibUEH6UU%3D' -o /tmp/readme-screenshots-v2.zip
          unzip -o /tmp/readme-screenshots-v2.zip -d /tmp/readme-screenshots-v2
          cp /tmp/readme-screenshots-v2/*.jpg images/

      - name: Commit screenshots and remove temporary workflow
        run: |
          rm -f .github/workflows/refresh-readme-screenshots.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: refresh corrected 1920x1080 screenshots'
          git push
