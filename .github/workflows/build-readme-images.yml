name: Build README images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-readme-images.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          mkdir -p /tmp/readme-capture
          cd /tmp/readme-capture
          npm init -y
          npm install playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Capture 1920x1080 website screenshots
        run: |
          mkdir -p "$GITHUB_WORKSPACE/images"
          cat > /tmp/readme-capture/capture.mjs <<'EOF'
          import { chromium } from 'playwright';

          const output = process.env.GITHUB_WORKSPACE + '/images';
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 1920, height: 1080 },
            deviceScaleFactor: 1,
            ignoreHTTPSErrors: true,
            userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36',
          });
          const page = await context.newPage();

          async function load(url) {
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 90000 });
            await page.waitForTimeout(5000);
            await page.evaluate(() => {
              document.documentElement.style.scrollBehavior = 'auto';
              document.querySelectorAll('video').forEach((video) => video.pause?.());
            });
          }

          async function save(file) {
            await page.screenshot({
              path: `${output}/${file}`,
              type: 'jpeg',
              quality: 80,
              fullPage: false,
            });
          }

          await load('https://hirevuegames.com/');
          await page.evaluate(() => window.scrollTo(0, 0));
          await page.waitForTimeout(1000);
          await save('practice-hirevue-games-before-your-assessment.jpg');

          await page.evaluate(() => {
            const target = [...document.querySelectorAll('h2')].find((el) => el.textContent?.includes('Practice All HireVue Games'));
            if (target) target.scrollIntoView({ block: 'start' });
            else window.scrollTo(0, 950);
            window.scrollBy(0, -120);
          });
          await page.waitForTimeout(1400);
          await save('hirevue-games-supported-practice-games.jpg');

          await page.evaluate(() => {
            const target = [...document.querySelectorAll('h2')].find((el) => el.textContent?.includes('How HireVue Games Practice Works'));
            if (target) target.scrollIntoView({ block: 'start' });
            else window.scrollTo(0, 2000);
            window.scrollBy(0, -120);
          });
          await page.waitForTimeout(1400);
          await save('how-hirevue-games-practice-works.jpg');

          await load('https://hirevuegames.com/games/numerosity');
          await page.evaluate(() => window.scrollTo(0, 0));
          await page.waitForTimeout(1000);
          await save('hirevue-numerosity-game-practice.jpg');

          await browser.close();
          EOF
          cd /tmp/readme-capture
          node capture.mjs

      - name: Commit images and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f images/practice-hirevue-games-before-your-assessment.svg
          git rm .github/workflows/build-readme-images.yml
          git add images README.md
          git commit -m "docs: add 1920x1080 HireVueGames screenshots"
          git push
