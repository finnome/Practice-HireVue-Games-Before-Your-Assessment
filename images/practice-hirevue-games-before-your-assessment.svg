<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Practice HireVue Games Before Your Assessment</title>
  <desc id="description">Desktop preview of HireVueGames showing interactive HireVue game demos, guided practice, free samples, and private practice results.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#246bfe" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <g transform="translate(165 40)">
      <rect x="0" y="0" width="48" height="48" rx="13" fill="#ffffff" stroke="#246bfe" stroke-width="4"/>
      <circle cx="15" cy="15" r="4" fill="#246bfe"/>
      <circle cx="33" cy="15" r="4" fill="#246bfe"/>
      <circle cx="15" cy="33" r="4" fill="#246bfe"/>
      <circle cx="33" cy="33" r="4" fill="#246bfe"/>
      <path d="M15 15H33M15 15V33M15 33H33" fill="none" stroke="#246bfe" stroke-width="3" stroke-linecap="round"/>
      <text x="66" y="36" font-size="30" font-weight="750" fill="#0b1f44">HireVueGames</text>
    </g>
    <line x1="80" y1="112" x2="1520" y2="112" stroke="#e7edf7" stroke-width="2"/>
    <rect x="80" y="155" width="1440" height="680" rx="28" fill="url(#hero)"/>
    <circle cx="1070" cy="420" r="78" fill="#f7f5ef" opacity="0.8"/>
    <g fill="#dce8ff" opacity="0.9">
      <circle cx="1350" cy="315" r="3"/><circle cx="1380" cy="315" r="3"/><circle cx="1410" cy="315" r="3"/><circle cx="1440" cy="315" r="3"/>
      <circle cx="1350" cy="345" r="3"/><circle cx="1380" cy="345" r="3"/><circle cx="1410" cy="345" r="3"/><circle cx="1440" cy="345" r="3"/>
      <circle cx="1350" cy="375" r="3"/><circle cx="1380" cy="375" r="3"/><circle cx="1410" cy="375" r="3"/><circle cx="1440" cy="375" r="3"/>
      <circle cx="1350" cy="405" r="3"/><circle cx="1380" cy="405" r="3"/><circle cx="1410" cy="405" r="3"/><circle cx="1440" cy="405" r="3"/>
    </g>
    <rect x="210" y="205" width="390" height="48" rx="24" fill="#edf3ff"/>
    <text x="235" y="237" font-size="20" font-weight="800" fill="#1457d9" letter-spacing="0.6">INTERACTIVE HIREVUE GAME DEMOS</text>
    <text x="210" y="350" font-size="72" font-weight="800" fill="#0b2858">Practice HireVue Games</text>
    <text x="210" y="438" font-size="72" font-weight="800" fill="#0b2858">Before Your Assessment</text>
    <text x="210" y="520" font-size="29" font-weight="450" fill="#61718e">Learn the format and build familiarity with the controls and timing</text>
    <text x="210" y="562" font-size="29" font-weight="450" fill="#61718e">before assessment day. Start with guided practice, then move to</text>
    <text x="210" y="604" font-size="29" font-weight="450" fill="#61718e">timed mock tests when you are ready.</text>
    <g font-size="25" font-weight="650" fill="#30466d">
      <circle cx="228" cy="668" r="15" fill="#49c979"/><path d="M220 668l6 6 11-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="260" y="676">Guided practice for all supported game types</text>
      <circle cx="228" cy="718" r="15" fill="#49c979"/><path d="M220 718l6 6 11-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="260" y="726">Free one-question interactive demos</text>
      <circle cx="228" cy="768" r="15" fill="#49c979"/><path d="M220 768l6 6 11-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="260" y="776">Private practice activity and results</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="920" y="585" width="430" height="190" rx="22" fill="#ffffff" stroke="#e2eaf7" stroke-width="2"/>
