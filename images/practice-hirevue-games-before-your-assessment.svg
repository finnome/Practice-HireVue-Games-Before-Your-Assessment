      <text x="945" y="738" font-size="18" fill="#6b7b98">Try one free sample from a supported game.</text>
      <rect x="1165" y="688" width="155" height="50" rx="14" fill="#ffffff" stroke="#dce6f7" stroke-width="2"/>
      <text x="1190" y="720" font-size="19" font-weight="700" fill="#18345f">Numerosity</text>
